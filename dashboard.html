<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Alumno</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h2>Datos del Alumno</h2>

<input id="nombre" placeholder="Nombre completo">
<input id="edad" placeholder="Edad">
<input id="curp" placeholder="CURP">
<input id="grupo" placeholder="Grupo">

<select id="carrera">
<option>Sistemas computacionales</option>
<option>Biología</option>
<option>Agronomía</option>
<option>Veterinaria</option>
<option>Gestión empresarial</option>
</select>

<h3>Familiar</h3>
<input id="famNombre" placeholder="Nombre familiar">
<input id="parentesco" placeholder="Parentesco">
<input id="telefono" placeholder="Teléfono">

<button onclick="guardarDatos()">Guardar</button>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script type="module" src="firebase-config.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
